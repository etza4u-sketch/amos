<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>איקס מיקס דריקס טריוויה</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>❌ איקס מיקס דריקס טריוויה ⭕</h1>
      <p class="subtitle">ענה נכון = תקבל ✕ | ענה לא נכון = המחשב מקבל ○</p>
    </header>

    <div id="scoreboard">
      <div class="score-card player">
        <span class="score-label">👤 שחקן (✕)</span>
        <span class="score-value" id="player-score">0</span>
      </div>
      <div class="score-card draws">
        <span class="score-label">🤝 תיקו</span>
        <span class="score-value" id="draw-score">0</span>
      </div>
      <div class="score-card computer">
        <span class="score-label">🤖 מחשב (○)</span>
        <span class="score-value" id="computer-score">0</span>
      </div>
    </div>

    <div id="status-bar">
      <span id="status-text">בחר תא כדי לענות על שאלת טריוויה!</span>
    </div>

    <div id="board-wrapper">
      <div id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
    </div>

    <!-- Trivia Modal -->
    <div id="trivia-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-icon">🧠</span>
          <h2>שאלת טריוויה</h2>
          <span class="category-badge" id="q-category"></span>
        </div>
        <p id="q-text" class="question-text"></p>
        <div id="q-options" class="options-grid"></div>
        <button id="hint-btn" class="btn btn-hint">💡 רמז</button>
        <div id="hint-box" class="hint-box hidden"></div>
        <div id="answer-feedback" class="feedback hidden"></div>
      </div>
    </div>

    <!-- Win/Draw Overlay -->
    <div id="result-overlay" class="overlay hidden">
      <div class="result-box">
        <div id="result-emoji" class="result-emoji"></div>
        <h2 id="result-title"></h2>
        <p id="result-subtitle"></p>
        <button id="new-game-btn" class="btn btn-primary">🔄 משחק חדש</button>
        <button id="reset-scores-btn" class="btn btn-secondary">🗑️ אפס ניקוד</button>
      </div>
    </div>
  </div>

  <button id="global-new-game" class="btn btn-outline">🔄 משחק חדש</button>

  <script src="game.js"></script>
</body>
</html>
